{% extends "base.html" %}

{% block title %}Update Balance{% endblock %}

{% block content %}
<div class="update-balance">
    <h2>Update Your Balance</h2>
    
    {# Show current balance #}
    <div class="current-balance">
        <p>Current Balance: DH{{ "%.2f"|format(current_balance) }}</p>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="balance">New Balance:</label>
            <input type="number" step="0.01" id="balance" name="balance" 
                   value="{{ current_balance }}" required>
        </div>
        <button type="submit" class="btn">Update</button>
        <a href="{{ url_for('dashboard') }}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
